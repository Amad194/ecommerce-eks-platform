# Validation CI for the INFRA + GitOps config repo.
# This repo holds no application source, so it never builds/pushes images.
# It only proves the IaC + charts + GitOps manifests are well-formed.
# Image build/scan/push + tag bumps happen in the APP repos (see ci-templates/).
name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Validate (prod root)
        working-directory: terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate

  tflint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --recursive --format compact

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2
      - name: Lint + render all charts
        run: |
          for c in frontend magento api microservices worker; do
            helm dependency build "helm-charts/$c"
            helm lint "helm-charts/$c"
            helm template "helm-charts/$c" > /dev/null
          done

  gitops-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: YAML sanity (argocd/)
        run: |
          python -m pip install --quiet pyyaml
          python - <<'PY'
          import glob, sys, yaml
          bad = 0
          for f in glob.glob("argocd/**/*.yaml", recursive=True):
              try:
                  list(yaml.safe_load_all(open(f, encoding="utf-8")))
              except Exception as e:
                  bad += 1; print("FAIL", f, e)
          sys.exit(1 if bad else 0)
          PY
